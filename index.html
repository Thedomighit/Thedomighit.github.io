<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Financiero Pro</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: #1f2833;
            --primary-accent: #66fcf1;
            --text-main: #c5c6c7;
            --text-light: #ffffff;
            --danger: #ff5252;
            --success: #69f0ae;
            --warning: #ffd740;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
        }

        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; }

        .card { 
            background-color: var(--surface-color); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { color: var(--text-light); font-size: 1.4rem; text-align: center; margin-bottom: 5px; }
        h2 { font-size: 1.1rem; color: var(--text-light); margin-bottom: 12px; }

        /* Formulario Móvil */
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; 
            border: none; background: rgba(0,0,0,0.2); color: white; font-size: 1rem;
        }

        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: var(--primary-accent); color: #000; font-weight: bold; font-size: 1rem;
        }

        /* Balance */
        .balance-amount { font-size: 2rem; font-weight: bold; color: var(--primary-accent); text-align: center; margin: 10px 0; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: center; }
        .summary-item span { font-size: 0.7rem; display: block; }
        .summary-item strong { font-size: 0.9rem; }

        /* Lista Historial */
        .historial-list { list-style: none; margin-top: 15px; }
        .historial-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn-icon { background: none; border: none; padding: 10px; font-size: 1.2rem; cursor: pointer; }

        .val-plus { color: var(--success); }
        .val-minus { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Panel Financiero</h1></header>

    <!-- Resumen -->
    <div class="card">
        <div class="balance-amount" id="ui-balance">$0</div>
        <div class="summary-grid">
            <div class="summary-item"><span>INGRESOS</span><strong id="ui-tot-ingresos" class="val-plus">$0</strong></div>
            <div class="summary-item"><span>GASTOS</span><strong id="ui-tot-gastos" class="val-minus">$0</strong></div>
        </div>
    </div>

    <!-- Ingreso -->
    <div class="card">
        <h2>Registrar Movimiento</h2>
        <form id="form-main">
            <input type="number" id="val" placeholder="Monto" required>
            <input type="text" id="motivo" placeholder="Motivo" required>
            <select id="tipo">
                <option value="ingresos">Ingreso</option>
                <option value="gastos">Gasto</option>
            </select>
            <button type="submit">Guardar</button>
        </form>
    </div>

    <div class="card">
        <h2>Historial</h2>
        <ul class="historial-list" id="lista-movimientos"></ul>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('finanzas')) || { movimientos: [] };

    document.getElementById('form-main').addEventListener('submit', (e) => {
        e.preventDefault();
        db.movimientos.push({
            id: Date.now(),
            valor: document.getElementById('val').value,
            motivo: document.getElementById('motivo').value,
            tipo: document.getElementById('tipo').value
        });
        localStorage.setItem('finanzas', JSON.stringify(db));
        render();
        e.target.reset();
    });

    function render() {
        const lista = document.getElementById('lista-movimientos');
        lista.innerHTML = '';
        let total = 0;
        let ing = 0;
        let gas = 0;

        db.movimientos.forEach(m => {
            const v = Number(m.valor);
            if(m.tipo === 'ingresos') { total += v; ing += v; } else { total -= v; gas += v; }
            
            lista.innerHTML += `
                <li class="historial-item">
                    <div><strong>${m.motivo}</strong></div>
                    <div class="${m.tipo === 'ingresos' ? 'val-plus' : 'val-minus'}">$${v}</div>
                </li>`;
        });

        document.getElementById('ui-balance').innerText = `$${total}`;
        document.getElementById('ui-tot-ingresos').innerText = `$${ing}`;
        document.getElementById('ui-tot-gastos').innerText = `$${gas}`;
    }
    render();
</script>
</body>
</html>
